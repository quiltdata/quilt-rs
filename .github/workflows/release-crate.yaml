name: Release crate

on:
  workflow_dispatch:
    inputs:
      crate:
        description: Workspace crate to publish
        type: choice
        required: true
        options:
          - quilt-rs
          - quilt-uri
          - quilt-cli

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release

      - uses: taiki-e/install-action@parse-changelog

      - name: Resolve version and changelog notes
        id: meta
        env:
          CRATE: ${{ inputs.crate }}
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r --arg c "$CRATE" '.packages[] | select(.name == $c) | .version')
          [ -n "$VERSION" ] || { echo "::error::Could not resolve version for $CRATE"; exit 1; }
          parse-changelog "$CRATE/CHANGELOG.md" "$VERSION" > release-notes.md
          {
            echo "tag=$CRATE/v$VERSION"
            echo "title=$CRATE v$VERSION"
          } >> "$GITHUB_OUTPUT"

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish ${{ inputs.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ${{ inputs.crate }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md

  # Uploads `quilt-cli-<target>.tar.gz` for `cargo binstall`. Filename
  # mirrors the `pkg-url` template in `quilt-cli/Cargo.toml`'s
  # `[package.metadata.binstall]` — drift breaks `cargo binstall`.
  binaries:
    needs: publish
    if: ${{ inputs.crate == 'quilt-cli' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release
          targets: ${{ matrix.target }}

      - name: Build quilt-cli
        run: cargo build -p quilt-cli --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          set -euo pipefail
          STAGE="quilt-cli-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/quilt" "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.publish.outputs.tag }}" \
            "quilt-cli-${{ matrix.target }}.tar.gz" --clobber
