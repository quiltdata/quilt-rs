name: Release crate

on:
  workflow_dispatch:
    inputs:
      crate:
        description: Workspace crate to publish
        type: choice
        required: true
        options:
          - quilt-rs
          - quilt-uri
          - quilt-cli

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release

      - uses: taiki-e/install-action@parse-changelog

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish ${{ inputs.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ${{ inputs.crate }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CRATE: ${{ inputs.crate }}
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r --arg c "$CRATE" '.packages[] | select(.name == $c) | .version')
          NOTES=$(parse-changelog "$CRATE/CHANGELOG.md" "$VERSION")
          gh release create "$CRATE/v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$CRATE v$VERSION" \
            --notes "$NOTES"
