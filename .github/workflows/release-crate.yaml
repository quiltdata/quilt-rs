name: Release crate

on:
  workflow_dispatch:
    inputs:
      crate:
        description: Workspace crate to publish
        type: choice
        required: true
        options:
          - quilt-rs
          - quilt-uri
          - quilt-cli

jobs:
  # Stages the release: resolves version + notes, verifies path-dep version
  # specifiers are coherent, creates a draft GitHub release. For `quilt-cli`,
  # the `binaries` job uploads archives to the same draft. Nothing here
  # touches crates.io — the draft is the reviewable artifact.
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release

      - uses: taiki-e/install-action@parse-changelog

      - name: Resolve version and changelog notes
        id: meta
        env:
          CRATE: ${{ inputs.crate }}
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r --arg c "$CRATE" '.packages[] | select(.name == $c) | .version')
          [ -n "$VERSION" ] || { echo "::error::Could not resolve version for $CRATE"; exit 1; }
          parse-changelog "$CRATE/CHANGELOG.md" "$VERSION" > release-notes.md
          {
            echo "tag=$CRATE/v$VERSION"
            echo "title=$CRATE v$VERSION"
          } >> "$GITHUB_OUTPUT"

      # Catches the silent-mismatch failure where a downstream `version =`
      # specifier was not bumped after the upstream crate was bumped:
      # locally `cargo check` passes (path dep wins), `cargo publish`
      # succeeds (the old version still exists on crates.io), but end
      # users get a downstream crate that resolves to a stale upstream
      # whose API doesn't match. Compare each path-dep `req` with the
      # actual workspace version it points at; require an exact match
      # in cargo's default `^X.Y.Z` form.
      - name: Verify path-dep version specifiers
        env:
          CRATE: ${{ inputs.crate }}
        run: |
          set -euo pipefail
          metadata=$(cargo metadata --format-version=1 --no-deps)
          mismatches=0
          while IFS=$'\t' read -r dep_name dep_req; do
            [ -z "$dep_name" ] && continue
            actual=$(jq -r --arg n "$dep_name" '.packages[] | select(.name == $n) | .version' <<<"$metadata")
            if [ -z "$actual" ]; then
              echo "::error::path-dep '$dep_name' in $CRATE/Cargo.toml is not a workspace member"
              mismatches=$((mismatches + 1))
              continue
            fi
            if [ "$dep_req" != "^$actual" ]; then
              echo "::error::path-dep '$dep_name' in $CRATE/Cargo.toml has version specifier '$dep_req' but the workspace crate is at '$actual' — bump the specifier to '$actual'"
              mismatches=$((mismatches + 1))
            else
              echo "ok: $dep_name $dep_req matches workspace version $actual"
            fi
          done < <(jq -r --arg c "$CRATE" '
            .packages[] | select(.name == $c) | .dependencies[] |
            select(.path != null) | "\(.name)\t\(.req)"
          ' <<<"$metadata")
          if [ "$mismatches" -gt 0 ]; then
            exit 1
          fi

      # Every release starts as a draft and opts out of "latest":
      # - `--draft` lets a maintainer review notes/tag placement (and, for
      #   quilt-cli, wait for the `binaries` job to attach archives) before
      #   the `publish` job promotes via `gh release edit`.
      # - `--latest=false` keeps the ecosystem-wide "Latest release" slot
      #   reserved for QuiltSync (separate repo, the user-facing desktop
      #   app); `make_latest=false` is sticky, so promoting the draft does
      #   not flip it back to "latest".
      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md \
            --draft \
            --latest=false

      - name: Summarize draft for reviewer
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          url=$(gh release view "$TAG" --json url -q '.url')
          {
            echo "## Draft release ready for review"
            echo
            echo "- Tag: \`$TAG\`"
            echo "- URL: $url"
            echo
            echo "Approve the \`publish\` job in the Actions UI once the draft looks right."
          } >> "$GITHUB_STEP_SUMMARY"

  # Uploads `quilt-cli-<target>.tar.gz` to the draft release for
  # `cargo binstall`. Filename mirrors the `pkg-url` template in
  # `quilt-cli/Cargo.toml`'s `[package.metadata.binstall]` —
  # drift breaks `cargo binstall`.
  binaries:
    needs: prepare
    if: ${{ inputs.crate == 'quilt-cli' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release
          targets: ${{ matrix.target }}

      - name: Build quilt-cli
        run: cargo build -p quilt-cli --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          set -euo pipefail
          STAGE="quilt-cli-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/quilt" "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"

      - name: Upload asset to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "quilt-cli-${{ matrix.target }}.tar.gz" --clobber

  # Gated by the `crates-io` GitHub Environment (configured in repo
  # settings with required reviewers). Promotes the draft to public,
  # then publishes to crates.io. Order matters: if `cargo publish`
  # flakes, the GH release is public but crates.io is pending —
  # recoverable by re-running just this job (OIDC mints a fresh token).
  # The reverse order is irrecoverable.
  publish:
    needs: [prepare, binaries]
    # Library crates (quilt-rs, quilt-uri) skip `binaries`; treat its
    # 'skipped' result as a pass so the gate still fires for them.
    if: ${{ !cancelled() && needs.prepare.result == 'success' && (needs.binaries.result == 'success' || needs.binaries.result == 'skipped') }}
    runs-on: ubuntu-24.04
    environment: crates-io
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Promote GitHub release (draft -> public)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --draft=false

      - name: Publish ${{ inputs.crate }} to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ${{ inputs.crate }}
