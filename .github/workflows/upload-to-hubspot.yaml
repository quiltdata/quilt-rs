name: Upload QuiltSync Artifacts to HubSpot

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub workflow run ID to download artifacts from (leave empty for latest successful release)"
        type: string
        required: false
      hubspot_folder:
        description: "HubSpot folder path to upload artifacts to"
        type: string
        required: true
        default: "/releases"

env:
  HUBSPOT_API_BASE: "https://api.hubapi.com"

jobs:
  collect-artifacts:
    name: Download Workflow Artifacts
    runs-on: ubuntu-24.04
    outputs:
      artifacts-path: ${{ steps.artifacts.outputs.path }}

    steps:
      - name: Create artifacts directory
        run: mkdir -p ./artifacts

      - name: Find latest release run ID (if not provided)
        if: inputs.run_id == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Finding latest successful QuiltSync release run..."

          # Get latest successful workflow run for Release QuiltSync
          latest_run=$(gh api repos/${{ github.repository }}/actions/workflows/release-quilt-sync.yaml/runs \
            --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -1)

          if [ -z "$latest_run" ]; then
            echo "❌ No successful release runs found"
            exit 1
          fi

          echo "Found latest successful release run ID: $latest_run"
          echo "DETECTED_RUN_ID=$latest_run" >> $GITHUB_ENV

      - name: Set final run ID
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "Using provided run ID: ${{ inputs.run_id }}"
            echo "FINAL_RUN_ID=${{ inputs.run_id }}" >> $GITHUB_ENV
          else
            echo "Using detected run ID: $DETECTED_RUN_ID"
            echo "FINAL_RUN_ID=$DETECTED_RUN_ID" >> $GITHUB_ENV
          fi

      - name: Download workflow artifacts for all platforms
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.FINAL_RUN_ID }}
          path: ./artifacts

      - name: Flatten artifacts directory structure
        run: |
          echo "Flattening nested artifact directories..."
          # Move all files from subdirectories to artifacts root
          find ./artifacts -type f -mindepth 2 -exec mv {} ./artifacts/ \;
          # Remove empty directories
          find ./artifacts -type d -empty -delete

          echo "Artifacts after flattening:"
          ls -la ./artifacts/

      - name: List collected artifacts
        id: artifacts
        run: |
          echo "Collected artifacts:"
          ls -la ./artifacts/
          echo "path=$(pwd)/artifacts" >> $GITHUB_OUTPUT

      - name: Upload artifacts for next job
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts/
          retention-days: 1

