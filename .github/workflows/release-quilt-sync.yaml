name: Release QuiltSync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        required: true

jobs:
  release:
    name: Build Release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-15" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    environment: ${{ inputs.environment }}
    env:
      # Use mold linker on Linux to avoid OOM crashes on memory-constrained CI runners
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-24.04'
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for release
        uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'quilt-sync/package-lock.json'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./quilt-sync

      # Windows Authenticode code signing via Tauri's built-in support.
      # Tauri signs installers during the build when bundle.windows.certificateThumbprint
      # is set in the config. We import the PFX into the Windows certificate store,
      # extract the thumbprint, and write a signing config file passed to tauri via --config.
      # If WINDOWS_PFX_BASE64 is not configured, signing is skipped gracefully.
      # See docs/windows-signing.md for certificate setup instructions.
      - name: Import Windows code signing certificate
        id: windows-codesign
        if: matrix.platform == 'windows-latest'
        shell: powershell
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_PFX_BASE64) {
            Write-Host "::warning::WINDOWS_PFX_BASE64 secret not configured — skipping code signing"
            return
          }
          if (-not $env:WINDOWS_PFX_PASSWORD) {
            throw "WINDOWS_PFX_BASE64 is set but WINDOWS_PFX_PASSWORD is missing"
          }

          $pfxPath = "$env:RUNNER_TEMP\\codesign.pfx"
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64)
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $cert = Import-PfxCertificate `
            -FilePath $pfxPath `
            -CertStoreLocation Cert:\\CurrentUser\\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_PFX_PASSWORD -Force -AsPlainText) `
            -ErrorAction Stop
          Remove-Item $pfxPath -Force

          $thumbprint = $cert.Thumbprint
          Write-Host "Imported certificate with thumbprint: $thumbprint"

          @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
                tsp = $true
              }
            }
          } | ConvertTo-Json -Depth 4 | Set-Content -Path "quilt-sync\\src-tauri\\signing-config.json"

          "enabled=true" >> $env:GITHUB_OUTPUT

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
          MIXPANEL_PROJECT_TOKEN: ${{ vars.MIXPANEL_PROJECT_TOKEN }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          # Auto updater signing keys - required for cryptographic verification
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tauri-action replaces \_\_VERSION\_\_ with the app version.
          tagName: quilt-sync-v__VERSION__
          releaseId: quilt-sync-__VERSION__
          releaseName: QuiltSync v__VERSION__
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} ${{ steps.windows-codesign.outputs.enabled == 'true' && '--config src-tauri/signing-config.json' || '' }}
          projectPath: "./quilt-sync"
          # Auto updater configuration - generates latest.json for update checks
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: false
