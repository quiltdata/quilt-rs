name: Release QuiltSync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        required: true

jobs:
  release:
    name: Build Release
    permissions:
      contents: write
      id-token: write  # required for Azure OIDC token request
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-15" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    environment: ${{ inputs.environment }}
    # Every matrix leg writes the same version (read from the same
    # Cargo.toml) so the aggregate `release.outputs.version` is stable
    # regardless of which leg finishes last.
    outputs:
      version: ${{ steps.tauri.outputs.appVersion }}
    env:
      # Use mold linker on Linux to avoid OOM crashes on memory-constrained CI runners
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-24.04'
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for release
        uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown' || 'wasm32-unknown-unknown' }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'quilt-sync/ui/package-lock.json'

      - name: Install trunk
        uses: taiki-e/install-action@trunk

      - name: Build the app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
          MIXPANEL_PROJECT_TOKEN: ${{ vars.MIXPANEL_PROJECT_TOKEN }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          # Auto updater signing keys - required for cryptographic verification
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tauri-action replaces \_\_VERSION\_\_ with the app version.
          # Emit the final tag form so promotion is a no-op review rather
          # than a manual rename — `upload-to-hubspot.yaml` expects this
          # exact form for `release_tag`.
          tagName: QuiltSync/v__VERSION__
          releaseId: QuiltSync-__VERSION__
          releaseName: QuiltSync v__VERSION__
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: "./quilt-sync"
          # Auto updater configuration - generates latest.json for update checks
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: false

      # Windows Authenticode code signing via Azure Trusted Signing.
      # We authenticate immediately before signing (not before the build) so the
      # OIDC token hasn't expired after the ~25 minute build.
      # See docs/windows-signing.md for setup instructions.
      - name: Azure login (OIDC)
        if: matrix.platform == 'windows-latest'
        uses: azure/login@v3
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts with Azure Trusted Signing
        if: matrix.platform == 'windows-latest'
        uses: azure/trusted-signing-action@v1
        with:
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: target/release/bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          file-digest: SHA256

  # Single approval gate that flips the draft to public, marks it as
  # "latest", and dispatches `upload-to-hubspot.yaml` — the two surfaces
  # used to be a manual `gh release edit` plus a separate Actions-tab
  # click. The HubSpot mirror is the actual rollout switch (HubFS is
  # the sole `latest.json` endpoint after the fallback was dropped from
  # `tauri.conf.json`), so "GH public, HubSpot pending" is invisible to
  # clients and re-running just this job recovers from a flake on
  # either side.
  promote:
    needs: release
    runs-on: ubuntu-24.04
    environment: quilt-sync-publish
    permissions:
      contents: write
      actions: write  # required for `gh workflow run`
    steps:
      - name: Promote draft and trigger HubSpot mirror
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          [ -n "$VERSION" ] || { echo "::error::release.outputs.version is empty"; exit 1; }
          tag="QuiltSync/v$VERSION"
          gh release edit "$tag" --draft=false --latest --repo "$REPO"
          gh workflow run upload-to-hubspot.yaml \
            --repo "$REPO" \
            -f release_tag="$tag"
          {
            echo "## QuiltSync $tag promoted"
            echo
            echo "- GitHub release marked public + latest"
            echo "- \`upload-to-hubspot.yaml\` dispatched (mirrors to HubFS + HubDB)"
          } >> "$GITHUB_STEP_SUMMARY"
