name: Release QuiltSync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        required: true
      build_macos_arm:
        description: "Build macOS ARM64 (M1+)"
        type: boolean
        default: true
      build_macos_intel:
        description: "Build macOS Intel x64"
        type: boolean
        default: false
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows (not compatible with pre-release versions)"
        type: boolean
        default: false

jobs:
  build-macos-arm:
    name: Build macOS ARM64
    if: ${{ inputs.build_macos_arm }}
    runs-on: macos-15
    permissions:
      contents: write
    environment: ${{ inputs.environment }}
    steps:
      - name: Build QuiltSync
        uses: ./.github/actions/build-quiltsync
        with:
          platform: macos-15
          args: "--target aarch64-apple-darwin"

  build-macos-intel:
    name: Build macOS Intel
    if: ${{ inputs.build_macos_intel }}
    runs-on: macos-15
    permissions:
      contents: write
    environment: ${{ inputs.environment }}
    steps:
      - name: Build QuiltSync
        uses: ./.github/actions/build-quiltsync
        with:
          platform: macos-15
          args: "--target x86_64-apple-darwin"

  build-linux:
    name: Build Linux
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    environment: ${{ inputs.environment }}
    steps:
      - name: Build QuiltSync
        uses: ./.github/actions/build-quiltsync
        with:
          platform: ubuntu-22.04
          args: ""

  build-windows:
    name: Build Windows
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    permissions:
      contents: write
    environment: ${{ inputs.environment }}
    steps:
      - name: Build QuiltSync
        uses: ./.github/actions/build-quiltsync
        with:
          platform: windows-latest
          args: ""
