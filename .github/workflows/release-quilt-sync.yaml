name: Release QuiltSync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        required: true
      build_macos_arm:
        description: "Build macOS ARM64 (M1+)"
        type: boolean
        default: true
      build_macos_intel:
        description: "Build macOS Intel x64"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows (not compatible with pre-release versions)"
        type: boolean
        default: false

jobs:
  release:
    name: Build Release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - ${{ inputs.build_macos_arm && fromJSON('{"platform": "macos-15", "args": "--target aarch64-apple-darwin"}') || fromJSON('{"skip": true}') }}
          - ${{ inputs.build_macos_intel && fromJSON('{"platform": "macos-15", "args": "--target x86_64-apple-darwin"}') || fromJSON('{"skip": true}') }}
          - ${{ inputs.build_linux && fromJSON('{"platform": "ubuntu-22.04", "args": ""}') || fromJSON('{"skip": true}') }}
          - ${{ inputs.build_windows && fromJSON('{"platform": "windows-latest", "args": ""}') || fromJSON('{"skip": true}') }}
    runs-on: ${{ matrix.platform }}
    environment: ${{ inputs.environment }}
    if: ${{ !matrix.skip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-22.04'
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for release
        uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'quilt-sync/package-lock.json'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./quilt-sync

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
          MIXPANEL_PROJECT_TOKEN: ${{ vars.MIXPANEL_PROJECT_TOKEN }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        with:
          # tauri-action replaces \_\_VERSION\_\_ with the app version.
          tagName: quilt-sync-v__VERSION__
          releaseId: quilt-sync-__VERSION__
          releaseName: QuiltSync v__VERSION__
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: "./quilt-sync"
