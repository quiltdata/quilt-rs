name: Release QuiltSync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: environment
        required: true

jobs:
  release:
    name: Build Release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-15" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    environment: ${{ inputs.environment }}
    env:
      # Use mold linker on Linux to avoid OOM crashes on memory-constrained CI runners
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-24.04'
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for release
        uses: ./.github/actions/setup-rust-minimal
        with:
          cache-target: release
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'quilt-sync/package-lock.json'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./quilt-sync

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
          MIXPANEL_PROJECT_TOKEN: ${{ vars.MIXPANEL_PROJECT_TOKEN }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          # Auto updater signing keys - required for cryptographic verification
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tauri-action replaces \_\_VERSION\_\_ with the app version.
          tagName: quilt-sync-v__VERSION__
          releaseId: quilt-sync-__VERSION__
          releaseName: QuiltSync v__VERSION__
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: "./quilt-sync"
          # Auto updater configuration - generates latest.json for update checks
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: false

      - name: Prepare Windows code signing certificate
        if: matrix.platform == 'windows-latest'
        shell: powershell
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
        run: |
          if (-not $env:WINDOWS_PFX_BASE64) {
            throw "Missing secret WINDOWS_PFX_BASE64"
          }
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\\codesign.pfx", $pfxBytes)

      - name: Sign Windows installers (EXE/MSI)
        id: sign-windows
        if: matrix.platform == 'windows-latest'
        shell: powershell
        env:
          PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if (-not $env:PFX_PASSWORD) {
            throw "Missing secret WINDOWS_PFX_PASSWORD"
          }

          # Discover signtool.exe from installed Windows SDK
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\\Windows Kits" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Select-Object -First 1 -ExpandProperty FullName

          # Install Windows SDK if signtool is not present on the runner image
          if (-not $signtool) {
            Write-Host "signtool not found; installing Windows SDK via Chocolatey..."
            choco install windows-sdk-10-version-2004-all -y
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\\Windows Kits" `
              -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match 'x64' } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $signtool) {
            throw "signtool.exe not found after SDK install"
          }

          Write-Host "Using signtool: $signtool"
          "signtool-path=$signtool" >> $env:GITHUB_OUTPUT

          $bundleRoot = "quilt-sync\\src-tauri\\target\\release\\bundle"
          if (-not (Test-Path $bundleRoot)) {
            throw "Bundle directory not found: $bundleRoot"
          }

          $files = Get-ChildItem $bundleRoot -Recurse -Include *.exe,*.msi
          if ($files.Count -eq 0) {
            throw "No .exe or .msi files found under $bundleRoot"
          }

          foreach ($f in $files) {
            Write-Host "Signing $($f.FullName)"
            & $signtool sign `
              /f "$env:RUNNER_TEMP\\codesign.pfx" `
              /p "$env:PFX_PASSWORD" `
              /fd SHA256 `
              /tr "http://timestamp.digicert.com" `
              /td SHA256 `
              /v `
              "$($f.FullName)"
          }

      - name: Verify Windows signatures
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $signtool = "${{ steps.sign-windows.outputs.signtool-path }}"
          $bundleRoot = "quilt-sync\\src-tauri\\target\\release\\bundle"

          $files = Get-ChildItem $bundleRoot -Recurse -Include *.exe,*.msi
          foreach ($f in $files) {
            Write-Host "Verifying $($f.FullName)"
            & $signtool verify /pa /v "$($f.FullName)"
          }
