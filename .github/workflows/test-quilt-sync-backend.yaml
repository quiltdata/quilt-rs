name: Test QuiltSync

on:
  push:
    paths:
      - "quilt-sync/src-tauri/**"
      - "!quilt-sync/src-tauri/**/*.md"
      - "quilt-sync/*.toml"
      - "quilt-sync/Cargo.*"
      - "rust-toolchain.toml"
      - ".github/workflows/test-quilt-sync-backend.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality (Ubuntu)
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-24.04
    env:
      # Use mold linker on Linux to avoid OOM crashes on memory-constrained CI runners
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for development
        uses: ./.github/actions/setup-rust-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Format
        run: cargo fmt --check
        working-directory: ./quilt-sync/src-tauri

      - name: Lint
        run: cargo clippy -- --deny warnings
        working-directory: ./quilt-sync/src-tauri

      - name: Test
        run: cargo nextest run
        working-directory: ./quilt-sync/src-tauri
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  cross-platform:
    name: Cross-Platform Tests
    if: github.ref == 'refs/heads/main'
    env:
      # Use mold linker on Linux to avoid OOM crashes on memory-constrained CI runners
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    strategy:
      matrix:
        platform: [ubuntu-24.04, macos-15, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-24.04'
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for testing
        uses: ./.github/actions/setup-rust-minimal
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: cargo nextest run
        working-directory: ./quilt-sync/src-tauri
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
