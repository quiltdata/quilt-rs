name: Test quilt_rs

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Rust project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust for development
        uses: ./.github/actions/setup-rust-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- --deny warnings

      - name: Test library
        run: cargo test -p quilt-rs --verbose
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Test CLI
        run: cargo test -p quilt-cli --verbose
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build library
        run: cargo build -p quilt-rs --verbose

      - name: Build CLI
        run: cargo build -p quilt-cli --verbose
