name: Test quilt_rs

on:
  push:
    paths:
      - "quilt-rs/**"
      - "!quilt-rs/**/*.md"
      - "Cargo.*"
      - "rust-toolchain.toml"
      - ".github/workflows/test-quilt-rs.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Rust project
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust for development
        uses: ./.github/actions/setup-rust-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check formatting
        run: cargo fmt --check -p quilt-rs

      - name: Lint
        run: cargo clippy -p quilt-rs --all-features -- --deny warnings

      - name: Test library + CLI
        run: cargo nextest run -p quilt-rs --all-features
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Test library doctests
        run: cargo test --doc -p quilt-rs
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build lib-only (no default features)
        run: cargo build -p quilt-rs --no-default-features --lib

      - name: Build with CLI bin
        run: cargo build -p quilt-rs --bin quilt
