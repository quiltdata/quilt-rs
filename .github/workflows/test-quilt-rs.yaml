name: Test quilt_rs

on:
  push:
    paths:
      - "quilt-rs/**"
      - "!quilt-rs/**/*.md"
      - "quilt-cli/**"
      - "!quilt-cli/**/*.md"
      - "quilt-uri/**"
      - "!quilt-uri/**/*.md"
      - "Cargo.*"
      - "rust-toolchain.toml"
      - ".github/workflows/test-quilt-rs.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: workspace
    runs-on: ubuntu-24.04
    env:
      # Use mold linker on Linux to avoid OOM crashes on memory-constrained CI runners
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Ubuntu dependencies
        uses: ./.github/actions/install-ubuntu-deps

      - name: Setup Rust for development
        uses: ./.github/actions/setup-rust-dev
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- --deny warnings

      - name: Check WASM build (quilt-uri, default features)
        run: cargo check -p quilt-uri --target wasm32-unknown-unknown

      - name: Check WASM build (quilt-uri, all features)
        run: cargo check -p quilt-uri --target wasm32-unknown-unknown --all-features

      - name: Test
        run: cargo nextest run --workspace --all-targets --exclude quilt-sync-ui
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Test doctests
        run: cargo test --doc --workspace --exclude quilt-sync-ui
        env:
          RUST_BACKTRACE: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
