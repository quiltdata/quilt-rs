name: 'Build QuiltSync'
description: 'Build QuiltSync for a specific platform'

inputs:
  platform:
    description: 'Platform to build for (ubuntu-22.04, macos-15, windows-latest)'
    required: true
  args:
    description: 'Additional build arguments (e.g., --target aarch64-apple-darwin)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Ubuntu dependencies
      if: inputs.platform == 'ubuntu-22.04'
      uses: ./.github/actions/install-ubuntu-deps

    - name: Setup Rust for release
      uses: ./.github/actions/setup-rust-minimal
      with:
        cache-target: release
        targets: ${{ inputs.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'quilt-sync/package-lock.json'

    - name: Install frontend dependencies
      shell: bash
      run: npm install
      working-directory: ./quilt-sync

    - name: Build the app
      uses: tauri-apps/tauri-action@v0
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
        MIXPANEL_PROJECT_TOKEN: ${{ vars.MIXPANEL_PROJECT_TOKEN }}
        SENTRY_DSN: ${{ vars.SENTRY_DSN }}
      with:
        tagName: quilt-sync-v__VERSION__
        releaseId: quilt-sync-__VERSION__
        releaseName: QuiltSync v__VERSION__
        releaseBody: "See the assets to download and install this version."
        releaseDraft: true
        prerelease: false
        args: ${{ inputs.args }}
        projectPath: "./quilt-sync"