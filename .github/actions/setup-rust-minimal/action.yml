name: "Setup Rust (Minimal)"
description: "Setup Rust toolchain without extra components for building/testing"
inputs:
  cache-target:
    description: "Cache target profile (debug or release)"
    required: false
    default: "debug"
  targets:
    description: "Additional targets to install"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Rust
      uses: moonrepo/setup-rust@v1
      with:
        cache-base: main
        cache-target: ${{ inputs.cache-target }}
        targets: ${{ inputs.targets }}
