[workspace]
members = ["quilt-rs", "quilt-cli", "quilt-sync/src-tauri"]
resolver = "2"

[workspace.package]
version = "0.23.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/quiltdata/quilt-rs"

[workspace.dependencies]
arrow = "57.1.0"
arrow-array = "57.1.0"
async-stream = "0.3.6"
async-trait = "0.1.89"
aws-config = "1.8.12"
aws-credential-types = "1.2.11"
aws-sdk-s3 = "1.119.0"
aws-smithy-async = "1.2.7"
aws-smithy-checksums = "0.63.12"
aws-smithy-types = "1.3.5"
aws-types = "1.3.11"
chrono = { version = "0.4.42", features = ["serde"] }
clap = { version = "4.5.53", features = ["derive"] }
dirs = "6.0.0"
futures = "0.3.31"
futures-util = "0.3.31"
hex = "0.4.3"
multibase = "0.9.2"
multihash = "0.19.3"
parquet = { version = "57.1.0", features = ["async", "object_store"] }
percent-encoding = "2.3.2"
reqwest = { version = "0.12.28", features = ["json"] }
serde = { version = "1.0.228", features = ["derive", "serde_derive"] }
serde_json = { version = "1.0.147", features = ["preserve_order", "float_roundtrip"] }
serde_yaml = "0.9.34"
tabled = "0.20.0"
tempfile = "3.24.0"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
tokio-stream = "0.1.17"
tracing = { version = "0.1.44", features = ["log"] }
tracing-subscriber = "0.3.22"
url = {version = "2.5.7", features = ["serde"]}

# Dev dependencies
tokio-test = "0.4.4"
test-log = "0.2.19"
