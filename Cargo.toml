[package]
name = "quilt-rs"
version = "0.9.0"
edition = "2021"
description = "Rust library for accessing Quilt data packages."
documentation = "https://docs.quiltdata.com"
homepage = "https://www.quiltdata.com"
license = "Apache-2.0"
repository = "https://github.com/quiltdata/quilt-rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "src/lib.rs"

[dependencies]
arrow = "54.2.1"
arrow-array = "54.2.1"
async-stream = "0.3.6"
async-trait = "0.1.84"
aws-config = "1.5.12"
aws-credential-types = "1.2.1"
aws-sdk-s3 = "1.67.0"
aws-smithy-async = "1.2.3"
aws-smithy-types = "1.2.11"
aws-types = "1.3.3"
base64 = "0.22.1"
chrono = { version = "0.4.39", features = ["serde"] }
clap = { version = "4.5.23", features = ["derive"] }
dirs = "6.0.0"
futures = "0.3.31"
futures-util = "0.3.31"
hex = "0.4.3"
multihash = "0.19.3"
parquet = { version = "54.2.1", features = ["async", "object_store"] }
percent-encoding = "2.3.1"
reqwest = { version = "0.12.12", features = ["json"] }
serde = { version = "1.0.217", features = ["derive", "serde_derive"] }
serde_json = { version = "1.0.134", features = ["preserve_order"] }
serde_yaml = "0.9.34"
sha2 = "0.10.8"
tabled = "0.18.0"
tempfile = "3.15.0"
thiserror = "2.0.9"
tokio = { version = "1.42.0", features = ["full"] }
tokio-stream = "0.1.17"
tracing = { version = "0.1.41", features = ["log"] }
tracing-subscriber = "0.3.19"
url = {version = "2.5.4", features = ["serde"]}

[dev-dependencies]
tokio-test = "0.4.4"
