[package]
name = "quilt-rs"
version = "0.4.4"
edition = "2021"
description = "Rust library for accessing Quilt data packages."
documentation = "https://docs.quiltdata.com"
homepage = "https://www.quiltdata.com"
license = "Apache-2.0"
repository = "https://github.com/quiltdata/quilt-rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "src/lib.rs"

[dependencies]
aptos-openapi-link = "0.1.0"
arrow = "49.0.0"
async-trait = "0.1.74"
aws-config = "1.1.1"
aws-sdk-s3 = "1.8.0"
aws-types = "1.1.1"
chrono = { version = "0.4.31", features = ["serde"] }
futures = "0.3.29"
hex = "0.4.3"
lazy_static = "1.4.0"
multihash = "0.19.1"
object_store = { version = "0.8.0", features = ["aws", "base64", "reqwest", "serde", "serde_json"] }
poem = "1.3.59"
poem-openapi = "3.0.6"
reqwest = "0.11.23"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.108"
sha2 = "0.10.8"
sha256 = "1.4.0"
tokio = { version = "1.35.1", features = ["full"] }
tokio-stream = "0.1.14"
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
url = "2.5.0"

[dev-dependencies]
temp_testdir = "0.2.3"
tokio-test = "0.4.3"
utils = { path = "utils" }
