[package]
name = "quilt-rs"
version = "0.8.1"
edition = "2021"
description = "Rust library for accessing Quilt data packages."
documentation = "https://docs.quiltdata.com"
homepage = "https://www.quiltdata.com"
license = "Apache-2.0"
repository = "https://github.com/quiltdata/quilt-rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "src/lib.rs"

[dependencies]
arrow = "52.0.0"
arrow-array = "52.0.0"
async-stream = "0.3.5"
async-trait = "0.1.80"
aws-config = "1.5.2"
aws-credential-types = "1.2.0"
aws-sdk-s3 = "1.37.0"
aws-smithy-async = "1.2.1"
aws-smithy-types = "1.2.0"
aws-types = "1.3.1"
base64 = "0.22.1"
chrono = { version = "0.4.38", features = ["serde"] }
clap = { version = "4.5.7", features = ["derive"] }
figment = { version = "0.10.19", features = ["env", "yaml"] }
futures = "0.3.30"
futures-util = "0.3.30"
hex = "0.4.3"
lazy_static = "1.4.0"
multihash = "0.19.1"
parquet = { version = "52.0.0", features = ["async", "object_store"] }
percent-encoding = "2.3.1"
reqwest = "0.12.5"
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.117", features = ["preserve_order"] }
sha2 = "0.10.8"
tabled = "0.15.0"
temp-dir = "0.1.13"
tempfile = "3.10.1"
thiserror = "1.0.61"
tokio = { version = "1.38.0", features = ["full"] }
tokio-stream = "0.1.15"
tracing = { version = "0.1.40", features = ["log"] }
tracing-subscriber = "0.3.18"
url = "2.5.2"

[dev-dependencies]
temp_testdir = "0.2.3"
tokio-test = "0.4.4"
