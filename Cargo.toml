[package]
name = "quilt-rs"
version = "0.20.0"
edition = "2021"
description = "Rust library for accessing Quilt data packages."
documentation = "https://docs.quiltdata.com"
homepage = "https://www.quiltdata.com"
license = "Apache-2.0"
repository = "https://github.com/quiltdata/quilt-rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "src/lib.rs"

[dependencies]
arrow = "55.2.0"
arrow-array = "55.2.0"
async-stream = "0.3.6"
async-trait = "0.1.89"
aws-config = "1.8.8"
aws-credential-types = "1.2.8"
aws-sdk-s3 = "1.108.0"
aws-smithy-async = "1.2.6"
aws-smithy-types = "1.3.3"
aws-types = "1.3.9"
base64 = "0.22.1"
chrono = { version = "0.4.42", features = ["serde"] }
clap = { version = "4.5.50", features = ["derive"] }
dirs = "6.0.0"
futures = "0.3.31"
futures-util = "0.3.31"
hex = "0.4.3"
multihash = "0.19.3"
parquet = { version = "55.2.0", features = ["async", "object_store"] }
percent-encoding = "2.3.2"
reqwest = { version = "0.12.24", features = ["json"] }
serde = { version = "1.0.228", features = ["derive", "serde_derive"] }
serde_json = { version = "1.0.145", features = ["preserve_order", "float_roundtrip"] }
serde_yaml = "0.9.34"
sha2 = "0.10.9"
tabled = "0.20.0"
tempfile = "3.23.0"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
tokio-stream = "0.1.17"
tracing = { version = "0.1.41", features = ["log"] }
tracing-subscriber = "0.3.20"
url = {version = "2.5.7", features = ["serde"]}

[dev-dependencies]
tokio-test = "0.4.4"
test-log = "0.2.18"
