<form class="qui-uri" id="uri" action="remote-package.html">
  <input
    type="text"
    name="uri"
    placeholder="quilt+s3://bucket#package=foo/bar@hash"
    class="input"
    autocomplete="off"
    {% if let Some(uri_value) = uri %}value="{{ uri_value }}"{% endif %}
  />
  {{ submit_button | safe }}
</form>
