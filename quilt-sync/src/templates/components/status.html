<style>
  @import url("/assets/css/views/status.css");
</style>

<div class="qui-status">
  <div class="root">
    <h2 class="description">{{ description }}</h2>
    <div class="action">
      {{ button | safe }}
      {% if let Some(secondary_button) = secondary_button %}
        {{ secondary_button | safe }}
      {% endif %}
    </div>
  </div>
</div>
