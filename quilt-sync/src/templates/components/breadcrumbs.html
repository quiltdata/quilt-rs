<style>
  @import url("/assets/css/views/breadcrumbs.css");
</style>

<nav class="qui-breadcrumbs">
  <ul class="list">
    {%- for item in list %}
    <li class="item">
      {% match item %}
        {% when BreadcrumbItem::Current(current) %}
          {% include "./components/breadcrumb-current.html" %}
        {% when BreadcrumbItem::Link(link) %}
          {% include "./components/breadcrumb-link.html" %}
      {% endmatch %}
    </li>
    {% endfor %}
  </ul>
</nav>
